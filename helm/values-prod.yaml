# ============================================================
# Production Environment Overrides
# ============================================================

global:
  environment: prod

backend:
  replicaCount: 3
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

frontend:
  replicaCount: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  hosts:
    - host: arcten.com
      paths:
        - path: /api(/|$)(.*)
          pathType: Prefix
          backend: backend
        - path: /(.*)
          pathType: Prefix
          backend: frontend
