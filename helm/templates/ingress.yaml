{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "arcten.fullname" . }}-ingress
  labels:
    {{- include "arcten.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- range .Values.ingress.hosts }}
    - {{ if .host }}host: {{ .host | quote }}{{ end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "arcten.fullname" $ }}-{{ .backend }}
                port:
                  number: {{ if eq .backend "backend" }}{{ $.Values.backend.port }}{{ else }}{{ $.Values.frontend.port }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}
