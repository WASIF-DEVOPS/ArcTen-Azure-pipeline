apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "arcten.fullname" . }}-config
  labels:
    {{- include "arcten.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.backend.port | quote }}
  NODE_ENV: {{ .Values.backend.config.nodeEnv | quote }}
  FRONTEND_URL: {{ .Values.backend.config.frontendUrl | quote }}
