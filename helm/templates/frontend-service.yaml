apiVersion: v1
kind: Service
metadata:
  name: {{ include "arcten.fullname" . }}-frontend
  labels:
    {{- include "arcten.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "arcten.fullname" . }}-frontend
