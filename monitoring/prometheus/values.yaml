# ============================================================
# Helm Values configuration for kube-prometheus-stack
# ============================================================

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorMatchExpressions: []
    retention: 7d
    retentionSize: 10GiB
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1024Mi

grafana:
  adminPassword: prom-operator
  persistence:
    enabled: true
    storageClassName: default
    size: 5Gi

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
      routes:
      - match:
          alertname: DeadMansSwitch
        receiver: 'null'
    receivers:
    - name: 'null'
