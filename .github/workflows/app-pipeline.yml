# ================================================================
# ARCTen Application Pipeline
# All stages run in sequence inside this single workflow file.
# Each job appears as a separate stage in the GitHub Actions UI.
#
# Pipeline Flow:
#   sonar-scan ──► build ──► trivy-scan ──► deploy-dev / deploy-prod
# ================================================================

name: '📦 Build & Deploy Application'

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'helm/**'
      - 'docker/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_DEV: arcten-eks-dev

jobs:

  # ════════════════════════════════════════════════════════════
  # STAGE 1 — CODE QUALITY (SonarQube)
  # ════════════════════════════════════════════════════════════
  sonar-scan:
    name: '🔍 Code Quality — SonarQube'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for blame analysis

      - name: SonarQube Scan (Backend)
        uses: sonarsource/sonarqube-scan-action@v3
        continue-on-error: true  # Report results but never block the pipeline
        with:
          projectBaseDir: ./backend
          args: >
            -Dsonar.projectKey=arcten-backend
            -Dsonar.projectName=ARCTen_Backend
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,coverage/**,**/*.test.js
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Scan (Frontend)
        uses: sonarsource/sonarqube-scan-action@v3
        continue-on-error: true  # Report results but never block the pipeline
        with:
          projectBaseDir: ./frontend
          args: >
            -Dsonar.projectKey=arcten-frontend
            -Dsonar.projectName=ARCTen_Frontend
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,.next/**,out/**,**/*.test.tsx
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ════════════════════════════════════════════════════════════
  # STAGE 2 — BUILD (Docker → ECR)
  # ════════════════════════════════════════════════════════════
  build:
    name: '📦 Build — Docker & Push to ECR'
    runs-on: ubuntu-latest
    needs: sonar-scan          # Waits for Stage 1 to pass
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}
      registry: ${{ steps.ecr-login.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (Git SHA)
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/arcten-backend:${{ steps.meta.outputs.sha_short }}
            ${{ steps.ecr-login.outputs.registry }}/arcten-backend:latest

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/arcten-frontend:${{ steps.meta.outputs.sha_short }}
            ${{ steps.ecr-login.outputs.registry }}/arcten-frontend:latest

  # ════════════════════════════════════════════════════════════
  # STAGE 3 — SECURITY SCAN (Trivy)
  # ════════════════════════════════════════════════════════════
  trivy-scan:
    name: '🛡️ Security Scan — Trivy'
    runs-on: ubuntu-latest
    needs: build               # Waits for Stage 2 to pass
    permissions:
      id-token: write
      contents: read
      security-events: write   # Required to upload results to GitHub Security tab

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy Scan — Backend Image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true  # Report results but never block the pipeline
        with:
          image-ref: ${{ needs.build.outputs.registry }}/arcten-backend:${{ needs.build.outputs.image_tag }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'         # 0 = scan and report, never fail

      - name: Upload Backend Scan to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()           # Upload even on failure so results are visible
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Trivy Scan — Frontend Image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true  # Report results but never block the pipeline
        with:
          image-ref: ${{ needs.build.outputs.registry }}/arcten-frontend:${{ needs.build.outputs.image_tag }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'         # 0 = scan and report, never fail

      - name: Upload Frontend Scan to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  # ════════════════════════════════════════════════════════════
  # STAGE 4 — DEPLOY TO DEV (develop branch only)
  # ════════════════════════════════════════════════════════════
  deploy-dev:
    name: '🚀 Deploy — Dev Environment'
    runs-on: ubuntu-latest
    needs: trivy-scan          # Waits for Stage 3 to pass
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch Secrets from AWS Secrets Manager
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            arcten/dev/bootstrap-secrets
          parse-json-secrets: true

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS Dev
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_DEV }} --region ${{ env.AWS_REGION }}

      - name: Helm Deploy to Dev Namespace
        run: |
          helm upgrade --install arcten ./helm \
            --namespace dev-ns \
            --create-namespace \
            -f helm/values-dev.yaml \
            --set imageCredentials.registry=${{ steps.ecr-login.outputs.registry }} \
            --set backend.image.tag=${{ needs.build.outputs.image_tag }} \
            --set frontend.image.tag=${{ needs.build.outputs.image_tag }} \
            --set secrets.mongodbUri="${{ env.MONGODB_URI }}" \
            --set secrets.jwtSecret="${{ env.JWT_SECRET }}" \
            --set secrets.adminPassword="${{ env.ADMIN_PASSWORD }}"


